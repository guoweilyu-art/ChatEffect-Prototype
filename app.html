<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Effect – Prototype</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
  background:#111;color:#fff;
}
.shell{
  display:flex;align-items:center;justify-content:center;
  height:100%;position:relative;
}

/* ── Floating nav ── */
.float-nav{
  position:fixed;top:50%;transform:translateY(-50%);z-index:100;
  right:calc(50% + 393px/2 + 24px);
  display:flex;flex-direction:column;gap:4px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:4px;
}
.nav-item{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;
  font-size:13px;font-weight:500;color:rgba(255,255,255,.5);
  cursor:pointer;border:none;background:none;
  border-radius:8px;
  transition:color .2s,background .2s;
  white-space:nowrap;
}
.nav-item:hover{color:rgba(255,255,255,.8)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.12)}
.nav-icon{
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ── Phone area ── */
.phone-frame{
  width:393px;height:852px;
  border-radius:47px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.5);
  position:relative;background:#000;
}
.phone-frame iframe{
  width:393px;height:852px;border:none;
  position:absolute;top:0;left:0;
}
.phone-frame iframe.hidden{display:none}
</style>
</head>
<body>
<div class="shell">
  <nav class="float-nav">
    <button class="nav-item active" data-target="gem">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M2 9h20"/><path d="M10 3l-2 6 4 13 4-13-2-6"/></svg></span>
      Gem Store
    </button>
    <button class="nav-item" data-target="live">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg></span>
      Live Stream
    </button>
  </nav>

  <div class="phone-frame">
    <iframe id="frmGem" src="index.html"></iframe>
    <iframe id="frmLive" src="live.html" class="hidden"></iframe>
  </div>
</div>

<script>
const navItems = document.querySelectorAll('.nav-item');
const frmGem = document.getElementById('frmGem');
const frmLive = document.getElementById('frmLive');

navItems.forEach(btn => {
  btn.addEventListener('click', () => {
    navItems.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.dataset.target;
    frmGem.classList.toggle('hidden', target !== 'gem');
    frmLive.classList.toggle('hidden', target !== 'live');
  });
});
</script>
</body>
</html>
