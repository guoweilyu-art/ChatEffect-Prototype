<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Effect – Prototype</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
  background:#111;color:#fff;
}
.shell{display:flex;height:100%}

/* ── Sidebar ── */
.sidebar{
  width:200px;flex-shrink:0;
  background:#1a1a1a;
  border-right:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;
  padding:24px 0;
}
.sidebar-title{
  font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:rgba(255,255,255,.35);padding:0 20px 16px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;
  font-size:14px;font-weight:500;color:rgba(255,255,255,.5);
  cursor:pointer;border:none;background:none;text-align:left;
  transition:color .2s,background .2s;
  position:relative;width:100%;
}
.nav-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.08)}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:6px;bottom:6px;
  width:3px;border-radius:0 3px 3px 0;background:#fff;
}
.nav-icon{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  opacity:.7;flex-shrink:0;
}
.nav-item.active .nav-icon{opacity:1}

/* ── Phone area ── */
.phone-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.phone-frame{
  width:393px;height:852px;
  border-radius:47px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.5);
  position:relative;background:#000;
}
.phone-frame iframe{
  width:393px;height:852px;border:none;
  position:absolute;top:0;left:0;
}
.phone-frame iframe.hidden{display:none}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-title">Prototypes</div>
    <button class="nav-item active" data-target="gem">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M2 9h20"/><path d="M10 3l-2 6 4 13 4-13-2-6"/></svg></span>
      Gem Store
    </button>
    <button class="nav-item" data-target="live">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg></span>
      Live Stream
    </button>
  </nav>

  <div class="phone-area">
    <div class="phone-frame">
      <iframe id="frmGem" src="index.html"></iframe>
      <iframe id="frmLive" src="live.html" class="hidden"></iframe>
    </div>
  </div>
</div>

<script>
const navItems = document.querySelectorAll('.nav-item');
const frmGem = document.getElementById('frmGem');
const frmLive = document.getElementById('frmLive');

navItems.forEach(btn => {
  btn.addEventListener('click', () => {
    navItems.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.dataset.target;
    frmGem.classList.toggle('hidden', target !== 'gem');
    frmLive.classList.toggle('hidden', target !== 'live');
  });
});
</script>
</body>
</html>
